name: Build Bias + Deploy Pages

on:
  workflow_dispatch:
  schedule:
    # Run 1: 8:30 PM IST = 15:00 UTC  (initial attempt — NSE data may already be published)
    - cron: "00 15 * * 1-5"
    # Run 2: 9:00 PM IST = 15:30 UTC  (retry if PCR/VIX not yet published in Run 1)
    - cron: "30 15 * * 1-5"
    # Run 3: 9:30 PM IST = 16:00 UTC  (final retry — NSE always publishes by this time)
    - cron: "00 16 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & Build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet build -c Release --no-restore

      - name: Run SmartMoney job (ingest + compute + export JSON)
        shell: bash
        run: |
          dotnet run -c Release --project backend/SmartMoney.Job/SmartMoney.Job.csproj

      - name: Commit public/data back to repo (H2 support)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/ || true
          if git diff --cached --quiet; then
            echo "No changes to frontend/public/data — nothing to commit."
          else
            DATA_DATE=$(date -u '+%Y-%m-%d')
            git commit -m "chore: update market data ${DATA_DATE} [skip ci]"
            git push
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Debug dist output
        shell: bash
        run: |
          echo "PWD:"
          pwd
          echo "frontend/dist:"
          ls -la frontend/dist || true
          echo "frontend/dist/assets:"
          ls -la frontend/dist/assets || true
          echo "frontend/dist/data:"
          ls -la frontend/dist/data || true
          echo "frontend/dist/index.html head:"
          head -n 20 frontend/dist/index.html || true
          
      - name: Upload Pages artifact (frontend/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
