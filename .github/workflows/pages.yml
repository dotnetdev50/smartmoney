name: Build Bias + Deploy Pages

on:
  workflow_dispatch:
  schedule:
    # 9:40 PM IST = 16:10 UTC (IST is UTC+5:30)
    - cron: "10 16 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & Build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet build -c Release --no-restore

      - name: Run SmartMoney job (ingest + compute + export JSON)
        shell: bash
        run: |
          dotnet run -c Release --project backend/SmartMoney.Job/SmartMoney.Job.csproj

      - name: Debug dist output
        shell: bash
        run: |
          echo "PWD:"
          pwd
          echo "frontend/dist:"
          ls -la frontend/dist || true
          echo "frontend/dist/assets:"
          ls -la frontend/dist/assets || true
          echo "frontend/dist/data:"
          ls -la frontend/dist/data || true
          echo "frontend/dist/index.html head:"
          head -n 20 frontend/dist/index.html || true
          
      - name: Upload Pages artifact (frontend/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
